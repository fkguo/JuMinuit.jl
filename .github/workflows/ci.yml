name: CI

on:
  push:
    branches: [main]
    tags: ['*']
    # Skip CI when only documentation, benchmark artifacts, or tooling
    # changes — those have their own paths (docs.yml) or aren't tested
    # by `Pkg.test()`.
    paths-ignore:
      - 'docs/**'
      - 'benchmark/.julia-perf/**'
      - 'benchmark/cpp/build/**'
      - '**.md'
      - 'LICENSE'
      - 'CHANGELOG*'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'benchmark/.julia-perf/**'
      - 'benchmark/cpp/build/**'
      - '**.md'
      - 'LICENSE'
      - 'CHANGELOG*'
  schedule:
    # Monthly full-matrix sweep (1st of month, 06:00 UTC) — catch version/OS
    # regressions the per-push minimal CI misses, without the weekly macOS
    # (10× billing) cost.
    - cron: '0 6 1 * *'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Per-push minimal: just Julia 1 on Ubuntu. ~5 billable minutes,
  # gives fast feedback. macos is 10× billing — only on schedule/tag.
  test-minimal:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    name: Julia 1 - ubuntu-latest - ${{ github.event_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
          arch: x64
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: '4'
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
        continue-on-error: true   # codecov upload is best-effort

  # Full matrix: tags + monthly schedule + manual dispatch. One macOS job
  # (macos-14, Apple Silicon — macOS bills 10×); Julia 1.11 is the declared
  # compat floor (Project.toml: julia = "1.11").
  test-full:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - full
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'              # compat floor
          - '1'                 # current stable
        os:
          - ubuntu-latest
        arch:
          - x64
        include:
          # One macOS job (macOS bills 10×): Apple-Silicon native, Julia 1
          # only. Dropped macOS-latest/x64 (that runner is being retired).
          - os: macos-14
            version: '1'
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: '4'
